# Raw Kubernetes manifests for the platformd reference service. Apply onto the
# sovereign cluster (B-010) once provisioned: `kubectl apply -f deploy/k8s/`.
apiVersion: v1
kind: Namespace
metadata:
  name: vasa-eos
  labels: { app.kubernetes.io/part-of: vasa-eos-se-tn, tenancy.vasa/tier: "T0-sovereign" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platformd
  namespace: vasa-eos
  labels: { app: platformd }
spec:
  replicas: 3
  selector: { matchLabels: { app: platformd } }
  template:
    metadata:
      labels: { app: platformd }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: platformd
          image: ghcr.io/vasasenthil/vasa-platformd:latest
          ports: [ { containerPort: 8080, name: http } ]
          env:
            - { name: PORT, value: "8080" }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /readiness, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ "ALL" ] }
---
apiVersion: v1
kind: Service
metadata:
  name: platformd
  namespace: vasa-eos
spec:
  selector: { app: platformd }
  ports: [ { port: 80, targetPort: http, name: http } ]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: platformd
  namespace: vasa-eos
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: platformd }
  minReplicas: 3
  maxReplicas: 240   # L10 capacity model: app nodes for the crore-hour peak
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
