name: CI

# Standard Next.js + pnpm gate: install -> lint -> typecheck -> build, plus a
# Node-22 unit-test + coverage job. Runs on main and on the stacked claude/*
# feature branches (so PRs targeting those branches are gated too).

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main", "claude/**"]

jobs:
  build:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    # Node's TypeScript type-stripping (--experimental-strip-types) needs Node >= 22.6.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run unit tests (with enforced coverage thresholds)
        # pipefail is on by default in Actions bash, so a threshold failure still
        # fails the job while coverage.txt is captured for the summary/comment.
        run: pnpm run test:coverage | tee coverage.txt

      - name: Build coverage summary
        if: always()
        run: node scripts/coverage-summary.mjs

      - name: Comment coverage on the PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            if (!fs.existsSync('coverage-comment.md')) return
            const body = fs.readFileSync('coverage-comment.md', 'utf8')
            const marker = '<!-- coverage-report -->'
            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number })
            const existing = comments.find((c) => c.body && c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }
