name: NodeJS with Gulp

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# NOTE: This project is a Next.js/TypeScript app (it does not use Gulp). The original
# 'gulp' build step always failed, which shows red CI and — where a deploy waits on
# checks — can block the live deployment. The job below runs the project's REAL build
# so the workflow passes and never gates a deploy.
jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    # react-simple-maps@3 declares a React 16-18 peer range while this app is on
    # React 19, so a strict npm install fails with ERESOLVE. --legacy-peer-deps
    # (also set in .npmrc) accepts the newer React, matching what the pnpm-based CI does.
    - name: Install dependencies
      run: npm install --legacy-peer-deps --no-audit --no-fund

    - name: Typecheck
      run: ./node_modules/.bin/tsc --noEmit

    - name: Build
      run: ./node_modules/.bin/next build
