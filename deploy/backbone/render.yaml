# VASA-EOS(SE)-TN — public BACKBONE blueprint (Render).
#
# One-click path to a public, durable Go backbone so the deployed Vercel site becomes fully click-to-persist.
# This deploys ONLY the backbone (PostgreSQL + platformd) and gives platformd a public HTTPS URL; the Next.js
# console stays on Vercel and is pointed at that URL via the PLATFORM_URL env var (see deploy/backbone/README.md).
#
# Usage: in the Render dashboard → New → Blueprint → connect this repo → it reads this file. Or `render blueprint launch`.
# After it deploys, copy the platformd service URL (https://vasa-eos-platformd.onrender.com) and set it as
# PLATFORM_URL in Vercel, then redeploy the Vercel project.

databases:
  - name: vasa-eos-backbone-db
    databaseName: vasa
    user: vasa
    plan: free # upgrade to a paid plan for a real pilot (free dbs are capped + expire)

services:
  - type: web
    name: vasa-eos-platformd
    runtime: docker
    dockerfilePath: ./Dockerfile.platformd
    dockerContext: .
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      # the durable store — platformd self-migrates every vertical's tables here on boot (CREATE TABLE IF NOT EXISTS)
      - key: DATABASE_URL
        fromDatabase:
          name: vasa-eos-backbone-db
          property: connectionString
      # the district this deployment seeds + scopes against (any valid TN district id; tree carries all 38)
      - key: PILOT_DISTRICT
        value: TN-DIST-Chennai
      # a sibling district so the multi-school roll-ups span more than one node (see seed densification)
      - key: PILOT_DISTRICT_2
        value: TN-DIST-Coimbatore
      - key: PORT
        value: "8080"
